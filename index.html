<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logic Shit Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      border: 1px solid #e8e8e0;
    }
    .title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #999; margin-bottom: 1.5rem; }
    textarea {
      width: 100%; min-height: 140px; padding: 12px;
      font-size: 15px; font-family: inherit;
      border: 1px solid #e0e0d8; border-radius: 10px;
      background: #fafaf8; color: #1a1a1a;
      resize: vertical; outline: none; transition: border-color 0.15s;
    }
    textarea:focus { border-color: #999; }
    textarea::placeholder { color: #bbb; }
    .btn {
      margin-top: 12px; width: 100%; padding: 12px;
      font-size: 15px; font-weight: 500;
      border: 1px solid #1a1a1a; border-radius: 10px;
      background: #1a1a1a; color: #fff;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #333; }
    .btn:active { transform: scale(0.99); }
    .result { margin-top: 1.5rem; display: none; }
    .verdict {
      display: inline-block; font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .verdict.shit { background: #fde8e8; color: #c0392b; }
    .verdict.bad  { background: #fef3e2; color: #d35400; }
    .verdict.ok   { background: #e8f5e9; color: #27ae60; }
    .verdict.meh  { background: #f0f0ea; color: #888; }
    .score-label { font-size: 12px; color: #999; margin-bottom: 6px; }
    .score-bar { height: 6px; background: #f0f0ea; border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
    .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .score-fill.shit { background: #e74c3c; }
    .score-fill.bad  { background: #e67e22; }
    .score-fill.ok   { background: #27ae60; }
    .score-fill.meh  { background: #bbb; }
    .detected { font-size: 13px; color: #999; margin-bottom: 14px; min-height: 18px; }
    .detected span {
      display: inline-block; background: #f0f0ea; color: #666;
      border-radius: 4px; padding: 2px 8px; margin: 2px 3px 2px 0; font-size: 12px;
    }
    .quote {
      border-left: 3px solid #e0e0d8; padding: 10px 14px;
      font-size: 15px; color: #1a1a1a; line-height: 1.7;
      margin-bottom: 8px; background: #fafaf8; border-radius: 0 8px 8px 0;
    }
    .footer-note { margin-top: 12px; font-size: 12px; color: #bbb; text-align: right; }
  </style>
</head>
<body>
<div class="card">
  <div class="title">Logic Shit Detector</div>
  <div class="subtitle">前同事遗留系统 v1.0 · 开箱即用，无需AI</div>
  <textarea id="input" placeholder="把proposal、方案、任何奇怪言论粘贴进来..."></textarea>
  <button class="btn" onclick="detect()">开始检测</button>
  <div class="result" id="result">
    <span class="verdict" id="verdict-badge"></span>
    <div class="score-label">屎山指数</div>
    <div class="score-bar"><div class="score-fill" id="score-fill" style="width:0%"></div></div>
    <div class="detected" id="detected-words"></div>
    <div id="quotes"></div>
    <div class="footer-note">— 由离职同事友情开发，保持怀疑，独立思考</div>
  </div>
</div>

<script>
const BUZZWORDS = [
  "赋能","拉通","对齐","生态","闭环","抓手","颗粒度","底层逻辑",
  "顶层设计","方法论","赛道","护城河","降维打击","破圈","沉淀",
  "复盘","迭代","链路","跑通","落地","打法","势能","心智","体感",
  "感知","触达","场景","差异化","协同","联动","叙事","复用边界","落点"
];

const STRUCTURE_CHECKS = [
  {
    test: function(t) { return /不是.{1,20}而是/.test(t); },
    label: "AI句式", score: 40,
    quotes: [
      "检测到「不是...而是...」句式。神奇的脑回路，把AI当屁股，喂进去什么造出来的都是屎。",
      "「不是A，而是B」—— 经典AI文风。这段话是人写的还是机器挤出来的？建议作者自查。"
    ]
  },
  { test: function(t) { return (t.match(/[？?]/g)||[]).length > (t.match(/[。！!]/g)||[]).length; }, label: "问号多于句号", score: 20 },
  { test: function(t) { return t.length > 300 && !/\d/.test(t); }, label: "无数据支撑", score: 20 },
  { test: function(t) { return (t.match(/以及|同时|另外|此外/g)||[]).length >= 3; }, label: "连词堆砌", score: 20 },
  { test: function(t) { return t.length > 100 && (t.match(/[。！？!?]/g)||[]).length < 3; }, label: "断句混乱", score: 20 }
];

const QUOTES = {
  shit: [
    "This is beyond救了，建议撕了重写。",
    "This proposal is a disaster. 睡桥洞去吧，顺便想想怎么重写。",
    "垃圾，睡桥洞去吧，梦里可能会有灵感。",
    "你们都会被AI取代的，而且AI不需要睡桥洞。",
    "Buzzword检出率爆表，请稍微动一下脑子。"
  ],
  bad: [
    "Buzzword检出率偏高，请稍微动一下脑子。",
    "逻辑链存在断裂，argument不知所云。动一动脑子好吗？",
    "这不是proposal，这是buzzword大乱炖。Needs work.",
    "你们都会被AI取代的，而且AI至少逻辑自洽。",
    "结构性问题明显。This needs serious rethinking."
  ],
  ok: [
    "勉强及格。Still room for improvement，但至少没睡桥洞的必要。",
    "Logic基本自洽，没检测到明显屎山。继续保持。",
    "过关。不算惊艳，但至少不是disaster。"
  ]
};

const GIBBERISH_QUOTES = [
  "@¥&%！#& what are you talking about？keyboards有手就行。",
  "检测到人类情绪宣泄。这不是proposal，这是键盘的呐喊。",
  "Invalid input. 你是在打字还是在用头撞键盘？"
];

const SHORT_QUOTES = [
  "字数不足，无从下嘴。请喂我更多屎。",
  "太短了，连屎都没资格当。多写点。",
  "Sample size不足，无法判定。你是在写proposal还是发微博？"
];

const OFFHOURS_QUOTES = [
  "现在是非工作时间，你有加班费吗？",
  "系统提示：现在不是上班时间。这份proposal是在用生命在写吗？",
  "非工作时间检测到异常活动。建议先睡觉，屎明天再品。"
];

function pick(arr, n) {
  return [...arr].sort(function() { return Math.random() - 0.5; }).slice(0, n);
}

function isOffHours() {
  var now = new Date();
  var day = now.getDay();
  var hour = now.getHours();
  var min = now.getMinutes();
  if (day === 0 || day === 6) return true;
  if (hour < 9) return true;
  if (hour > 17) return true;
  if (hour === 17 && min >= 30) return true;
  return false;
}

function isGibberish(text) {
  var chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
  var ascii = (text.match(/[a-zA-Z0-9!@#$%^&*()\[\]{};:,.<>?\/\\+=_~`-]/g) || []).length;
  return chinese < 3 && ascii > 4;
}

function showResult(level, label, scoreVal, detectedHTML, quotesArr) {
  document.getElementById('result').style.display = 'block';
  var badge = document.getElementById('verdict-badge');
  badge.className = 'verdict ' + level;
  badge.textContent = label;
  var fill = document.getElementById('score-fill');
  fill.className = 'score-fill ' + level;
  setTimeout(function() { fill.style.width = scoreVal + '%'; }, 50);
  document.getElementById('detected-words').innerHTML = detectedHTML;
  document.getElementById('quotes').innerHTML = quotesArr.map(function(q) {
    return '<div class="quote">' + q + '</div>';
  }).join('');
}

function detect() {
  var text = document.getElementById('input').value.trim();
  if (!text) return;

  if (isGibberish(text)) {
    showResult('meh', '无效输入', 20, '', pick(GIBBERISH_QUOTES, 1));
    return;
  }

  if (text.length < 30) {
    showResult('meh', '样本不足', 10, '', pick(SHORT_QUOTES, 1));
    return;
  }

  var score = 0;
  var detected = [];
  var specialQuotes = [];

  BUZZWORDS.forEach(function(w) {
    if (text.indexOf(w) !== -1) { score += 15; detected.push(w); }
  });

  STRUCTURE_CHECKS.forEach(function(c) {
    if (c.test(text)) {
      score += c.score;
      detected.push(c.label);
      if (c.quotes) specialQuotes = specialQuotes.concat(c.quotes);
    }
  });

  score = Math.min(score, 100);

  var level, label;
  if (score >= 60)      { level = 'shit'; label = '一坨屎'; }
  else if (score >= 25) { level = 'bad';  label = '有待商榷'; }
  else                  { level = 'ok';   label = '勉强过关'; }

  var detectedHTML = detected.length
    ? '检测到：' + detected.map(function(w) { return '<span>' + w + '</span>'; }).join('')
    : '未检测到明显问题词汇';

  var finalQuotes = [];
  if (specialQuotes.length) {
    finalQuotes.push(pick(specialQuotes, 1)[0]);
    if (level !== 'ok') finalQuotes.push(pick(QUOTES[level], 1)[0]);
  } else {
    finalQuotes = pick(QUOTES[level], level === 'ok' ? 1 : 2);
  }

  if (isOffHours()) {
    finalQuotes.push(pick(OFFHOURS_QUOTES, 1)[0]);
  }

  showResult(level, label, score, detectedHTML, finalQuotes);
}
</script>
</body>
</html>
